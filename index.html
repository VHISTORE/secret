<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CPM2 Login</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #1c2733);
    color: var(--tg-theme-text-color, #f1f1f1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
}
.card { width: 100%; max-width: 400px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.sub {
    font-size: 13px;
    color: var(--tg-theme-hint-color, #8899a6);
    margin-bottom: 28px;
    line-height: 1.4;
}
.field { margin-bottom: 16px; }
label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    color: var(--tg-theme-hint-color, #8899a6);
    margin-bottom: 7px;
}
input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.07);
    background: var(--tg-theme-secondary-bg-color, #232f3e);
    color: var(--tg-theme-text-color, #fff);
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
}
input:focus { border-color: var(--tg-theme-button-color, #2481cc); }
.err {
    min-height: 20px;
    color: #ff6b6b;
    font-size: 13px;
    margin-bottom: 14px;
    line-height: 1.4;
}
button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #fff);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
}
button:disabled { opacity: 0.55; cursor: default; }
button:not(:disabled):active { opacity: 0.8; }
.lock-screen {
    text-align: center;
    padding: 40px 20px;
}
.lock-screen .icon { font-size: 56px; margin-bottom: 16px; }
.lock-screen h2 { font-size: 20px; margin-bottom: 10px; }
.lock-screen p { color: var(--tg-theme-hint-color, #8899a6); line-height: 1.5; font-size: 14px; }
</style>
</head>
<body>
<div class="card" id="root">
    <h1 id="title">🔐 Sign In</h1>
    <div class="sub" id="subtitle">Данные передаются напрямую боту — в чате ничего не появляется</div>
    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="account@gmail.com"
               autocomplete="email" inputmode="email" spellcheck="false">
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••"
               autocomplete="current-password">
    </div>
    <div class="err" id="err"></div>
    <button id="btn" onclick="submit()">Войти</button>
</div>

<script>
(function () {
    var tg = window.Telegram && window.Telegram.WebApp;
    var params = new URLSearchParams(window.location.search);
    var mode = params.get('mode') || 'login';

    // ── Block outside Telegram ────────────────────────────────────────────────
    if (!tg || !tg.initData || tg.initData.length === 0) {
        document.getElementById('root').innerHTML =
            '<div class="lock-screen">' +
            '<div class="icon">⛔</div>' +
            '<h2>Доступ запрещён</h2>' +
            '<p>Это приложение работает только внутри официального Telegram-бота.<br>' +
            'Открытие через браузер или другой клиент заблокировано.</p>' +
            '</div>';
        return;
    }

    // ── Setup ─────────────────────────────────────────────────────────────────
    tg.ready();
    tg.expand();
    tg.MainButton.hide();
    tg.BackButton.hide();

    if (mode === 'af') {
        document.getElementById('title').textContent = '🤖 Auto Farm';
        document.getElementById('subtitle').textContent = 'Добавить аккаунт в авто-фарм';
        document.getElementById('btn').textContent = 'Добавить';
    }

    // ── Submit ────────────────────────────────────────────────────────────────
    window.submit = function () {
        var email = document.getElementById('email').value.trim().toLowerCase();
        var pw    = document.getElementById('password').value;
        var errEl = document.getElementById('err');
        var btn   = document.getElementById('btn');

        errEl.textContent = '';

        if (!email || email.indexOf('@') < 1 || email.length < 5) {
            errEl.textContent = '❌ Введите корректный email';
            document.getElementById('email').focus();
            return;
        }
        if (!pw || pw.length < 4) {
            errEl.textContent = '❌ Введите пароль';
            document.getElementById('password').focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = '⏳ Отправка…';

        // sendData closes the webapp and sends data as a service message to the bot.
        // The data is NOT stored in Telegram chat history on the user's side.
        tg.sendData(JSON.stringify({ mode: mode, email: email, password: pw }));
    };

    // Submit on Enter key
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') window.submit();
    });
}());
</script>
</body>
</html>
